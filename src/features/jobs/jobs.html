<div class="page" id="page-jobs">
  <section class="section">
    <div class="wrap">
      <div class="head jobs-head reveal">
        <div class="jobs-head-text">
          <h1 data-i18n="jobs_h1">Open roles</h1>
          <p class="sub" data-i18n="jobs_sub">Hand-picked software roles at Japan's product companies. Salary and Japanese level shown on every listing.</p>
        </div>
        <button class="btn btn--ghost jobs-saved-toggle" id="savedToggle" type="button" aria-pressed="false">
          <span class="jst-heart" aria-hidden="true">♥</span><span id="savedToggleLabel">Saved (0)</span>
        </button>
      </div>
      <div class="jobs-layout">
        <aside class="filters-side reveal" aria-label="Filters">
          <div class="fgroup">
            <label class="glab" data-i18n="f_grp_search">Search</label>
            <div class="search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
              <input type="text" id="filterSearch" data-i18n-ph="filter_search_ph" placeholder="" aria-label="Search roles" />
            </div>
          </div>
          <div class="fgroup">
            <label class="glab" for="filterSpec" data-i18n="f_grp_spec">Specialty</label>
            <div class="selectwrap"><select id="filterSpec"></select></div>
          </div>
          <div class="fgroup">
            <label class="glab" for="filterStack" data-i18n="f_grp_stack">Tech stack</label>
            <div class="selectwrap"><select id="filterStack"></select></div>
          </div>
          <div class="fgroup">
            <label class="glab" for="filterJp" data-i18n="f_grp_jp">Japanese level</label>
            <div class="selectwrap"><select id="filterJp">
              <option value="" data-i18n="filter_jp_all">Any level</option>
              <option value="none" data-i18n="filter_jp_none">No Japanese required</option>
              <option value="conversational" data-i18n="filter_jp_conv">Conversational</option>
              <option value="business" data-i18n="filter_jp_biz">Business</option>
            </select></div>
          </div>
          <div class="fgroup">
            <label class="glab" for="filterRemote" data-i18n="f_grp_rem">Work style</label>
            <div class="selectwrap"><select id="filterRemote">
              <option value="" data-i18n="filter_rem_all">Any work style</option>
              <option value="full" data-i18n="filter_rem_full">Full remote</option>
              <option value="partial" data-i18n="filter_rem_part">Hybrid</option>
              <option value="no" data-i18n="filter_rem_no">On-site</option>
            </select></div>
          </div>
          <div class="fgroup">
            <label class="glab" for="filterLoc" data-i18n="f_grp_loc">Location</label>
            <div class="selectwrap"><select id="filterLoc"></select></div>
          </div>
          <div class="fgroup">
            <button class="fclear" id="filterClear" data-i18n="filter_clear">Clear filters</button>
          </div>
        </aside>
        <div class="jobs-main">
          <p class="result-count reveal" id="resultCount" role="status" aria-live="polite"></p>
          <div class="apply-notice" id="applyNotice" role="status" aria-live="polite" hidden></div>
          <div class="job-grid reveal" id="jobGrid"></div>
          <div class="select-bar" id="selectBar" hidden role="region" aria-label="Selected roles">
            <span class="sb-count" id="selCount"></span>
            <span class="sb-actions">
              <button class="btn btn--ghost" id="selClear" type="button" data-i18n="sel_clear">Clear</button>
              <button class="btn btn--primary" id="selApply" type="button">Apply to selected</button>
            </span>
          </div>
        </div>
      </div>
      <div class="partners jobs-partners reveal">
        <span class="lab" data-i18n="jobs_partners_lab">Teams we've placed engineers with</span>
        <div class="partner-wall" data-partner-marquee data-partner-set="placements" data-partner-rows="1" aria-label="Companies where LongWave has placed engineers"></div>
      </div>
    </div>
  </section>
</div>

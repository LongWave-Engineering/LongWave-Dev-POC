name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (don't waste minutes on stale commits).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & verify build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Run unit + data tests
        run: node --test

      - name: Build, then syntax-check the bundled app JS
        run: |
          bash build.sh
          node -e "const fs=require('fs');const h=fs.readFileSync('longwave-dev.html','utf8');const m=[...h.matchAll(/<script>([\s\S]*?)<\/script>/g)];fs.writeFileSync(process.env.RUNNER_TEMP+'/app.js', m[m.length-1][1]);"
          node --check "$RUNNER_TEMP/app.js"
          echo "✓ bundled app JS parses"

      - name: Verify the bundle is in sync with source
        run: |
          if ! git diff --quiet -- longwave-dev.html; then
            echo "::error::longwave-dev.html is out of date — run ./build.sh and commit the result."
            git --no-pager diff --stat -- longwave-dev.html
            exit 1
          fi
          echo "✓ bundle is in sync with src/"

  package:
    name: Package built site
    needs: test
    # Only on pushes to main — PRs are gated by `test`, no artifact needed.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Build the single-file site
        run: bash build.sh

      - name: Upload built site as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: longwave-dev-html-${{ github.sha }}
          path: longwave-dev.html
          if-no-files-found: error
          retention-days: 90

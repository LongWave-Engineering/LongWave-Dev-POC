name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (don't waste minutes on stale commits).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & verify build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # The backend declares engines >=22 and uses experimental node:sqlite, whose API
      # shifted between 22 and 24 — test BOTH so code can't pass on 24 yet throw on the
      # documented minimum. Both suites are dependency-free, so the extra leg is cheap.
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      - name: Run frontend unit + guardrail tests
        run: node --test

      - name: Run backend tests (with a coverage floor)
        # node:test's built-in coverage gate — no dependency. Thresholds sit a few points
        # below current (90 lines / 84 branches / 85 funcs) so a new untested module fails CI.
        run: node --test --experimental-test-coverage --test-coverage-lines=85 --test-coverage-branches=78 --test-coverage-functions=80
        working-directory: backend

      - name: Build, then syntax-check the bundled app JS
        run: |
          bash build.sh
          node -e "const fs=require('fs');const h=fs.readFileSync('longwave-dev.html','utf8');const m=[...h.matchAll(/<script>([\s\S]*?)<\/script>/g)];if(m.length!==1){console.error('::error::expected exactly 1 <script> block in the bundle, found '+m.length);process.exit(1);}const js=m[0][1];if(!js.trim()){console.error('::error::extracted app JS is empty');process.exit(1);}fs.writeFileSync(process.env.RUNNER_TEMP+'/app.js', js);"
          node --check "$RUNNER_TEMP/app.js"
          echo "✓ bundled app JS parses (exactly one script block)"

      - name: Verify the bundle is in sync with source
        run: |
          git ls-files --error-unmatch longwave-dev.html >/dev/null 2>&1 || { echo "::error::longwave-dev.html is not tracked — the freshness gate can't protect an untracked bundle."; exit 1; }
          if ! git diff --quiet -- longwave-dev.html; then
            echo "::error::longwave-dev.html is out of date — run ./build.sh and commit the result."
            git --no-pager diff --stat -- longwave-dev.html
            exit 1
          fi
          echo "✓ bundle is in sync with src/"

  contract:
    name: Validate the API contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      # The spec is the source of truth frontends generate types from — lint it and prove
      # type generation still succeeds, so a bad edit (dangling $ref, dup operationId,
      # 3.1-invalid schema) fails HERE instead of in a downstream repo's build. CI may
      # download tools via npx; nothing is added to any package.json (repo stays zero-dep).
      - name: Lint OpenAPI + verify TypeScript generation
        run: |
          npx --yes @redocly/cli@latest lint docs/openapi.yaml
          npx --yes openapi-typescript@latest docs/openapi.yaml -o "$RUNNER_TEMP/lw-api.d.ts"
          echo "✓ openapi.yaml is valid and generates types"

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Post-push tripwire mirroring .githooks/pre-commit (hooks are opt-in via `npm run
      # hooks`, so an unhooked clone still gets caught). Repo is public → a landed token
      # must be found and rotated. Whitelists the in-tree placeholders.
      - name: Scan tracked files for credential-shaped strings
        run: |
          if git grep -nE 'sk-ant-[A-Za-z0-9_-]{8,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY|(ADMIN_TOKEN|MANATAL_API_KEY|HRMOS_API_TOKEN|ANTHROPIC_API_KEY)=[^[:space:]"]{8,}' -- . ':(exclude)backend/.env.example' \
             | grep -Ev 'dev-admin-token|sk-ant-\.\.\.'; then
            echo "::error::a tracked file contains a credential-shaped string — rotate it and move the secret to .env / sources.local.json (gitignored)."
            exit 1
          fi
          echo "✓ no credential-shaped strings in tracked files"

  package:
    name: Package built site
    needs: test
    # Only on pushes to main — PRs are gated by `test`, no artifact needed.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Build the single-file site
        run: bash build.sh

      - name: Upload built site as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: longwave-dev-html-${{ github.sha }}
          path: longwave-dev.html
          if-no-files-found: error
          retention-days: 90

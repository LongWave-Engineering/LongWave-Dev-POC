name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (don't waste minutes on stale commits).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # The backend (and its node:sqlite version matrix + coverage floor) lives in the
    # LongWave-Dev-Admin repo now — this suite is the frontend + bundle guardrails only.
    name: Test & verify build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run frontend unit + guardrail tests
        run: node --test

      - name: Build, then syntax-check the bundled app JS
        run: |
          bash build.sh
          node -e "const fs=require('fs');const h=fs.readFileSync('longwave-dev.html','utf8');const m=[...h.matchAll(/<script>([\s\S]*?)<\/script>/g)];if(m.length!==1){console.error('::error::expected exactly 1 <script> block in the bundle, found '+m.length);process.exit(1);}const js=m[0][1];if(!js.trim()){console.error('::error::extracted app JS is empty');process.exit(1);}fs.writeFileSync(process.env.RUNNER_TEMP+'/app.js', js);"
          node --check "$RUNNER_TEMP/app.js"
          echo "✓ bundled app JS parses (exactly one script block)"

      - name: Verify the bundle is in sync with source
        run: |
          git ls-files --error-unmatch longwave-dev.html >/dev/null 2>&1 || { echo "::error::longwave-dev.html is not tracked — the freshness gate can't protect an untracked bundle."; exit 1; }
          if ! git diff --quiet -- longwave-dev.html; then
            echo "::error::longwave-dev.html is out of date — run ./build.sh and commit the result."
            git --no-pager diff --stat -- longwave-dev.html
            exit 1
          fi
          echo "✓ bundle is in sync with src/"

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Post-push tripwire mirroring .githooks/pre-commit (hooks are opt-in via `npm run
      # hooks`, so an unhooked clone still gets caught). Repo is public → a landed token
      # must be found and rotated. Whitelists the in-tree placeholders.
      - name: Scan tracked files for credential-shaped strings
        run: |
          if git grep -nE 'sk-ant-[A-Za-z0-9_-]{8,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY|(ADMIN_TOKEN|MANATAL_API_KEY|HRMOS_API_TOKEN|ANTHROPIC_API_KEY)=[^[:space:]"]{8,}' -- . ':(exclude)*.env.example' \
             | grep -Ev 'dev-admin-token|sk-ant-\.\.\.'; then
            echo "::error::a tracked file contains a credential-shaped string — rotate it and move the secret to .env / sources.local.json (gitignored)."
            exit 1
          fi
          echo "✓ no credential-shaped strings in tracked files"

  package:
    name: Package built site
    needs: test
    # Only on pushes to main — PRs are gated by `test`, no artifact needed.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build the single-file site
        run: bash build.sh

      - name: Upload built site as an artifact
        uses: actions/upload-artifact@v7
        with:
          name: longwave-dev-html-${{ github.sha }}
          path: longwave-dev.html
          if-no-files-found: error
          retention-days: 90

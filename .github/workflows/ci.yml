name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (don't waste minutes on stale commits).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & verify build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run frontend unit + guardrail tests
        run: node --test

      - name: Run backend tests
        run: node --test
        working-directory: backend

      - name: Build, then syntax-check the bundled app JS
        run: |
          bash build.sh
          node -e "const fs=require('fs');const h=fs.readFileSync('longwave-dev.html','utf8');const m=[...h.matchAll(/<script>([\s\S]*?)<\/script>/g)];if(m.length!==1){console.error('::error::expected exactly 1 <script> block in the bundle, found '+m.length);process.exit(1);}const js=m[0][1];if(!js.trim()){console.error('::error::extracted app JS is empty');process.exit(1);}fs.writeFileSync(process.env.RUNNER_TEMP+'/app.js', js);"
          node --check "$RUNNER_TEMP/app.js"
          echo "✓ bundled app JS parses (exactly one script block)"

      - name: Verify the bundle is in sync with source
        run: |
          git ls-files --error-unmatch longwave-dev.html >/dev/null 2>&1 || { echo "::error::longwave-dev.html is not tracked — the freshness gate can't protect an untracked bundle."; exit 1; }
          if ! git diff --quiet -- longwave-dev.html; then
            echo "::error::longwave-dev.html is out of date — run ./build.sh and commit the result."
            git --no-pager diff --stat -- longwave-dev.html
            exit 1
          fi
          echo "✓ bundle is in sync with src/"

  package:
    name: Package built site
    needs: test
    # Only on pushes to main — PRs are gated by `test`, no artifact needed.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Build the single-file site
        run: bash build.sh

      - name: Upload built site as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: longwave-dev-html-${{ github.sha }}
          path: longwave-dev.html
          if-no-files-found: error
          retention-days: 90

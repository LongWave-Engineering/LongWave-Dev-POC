name: Release

# CD: cut a GitHub Release when a version tag is pushed (e.g. v1.0.0), or run
# manually with a tag input. The release is gated on the test suite passing.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v1.2.0). Created at the current commit if it does not exist.'
        required: true

permissions:
  contents: write   # required to create releases / tags

jobs:
  release:
    name: Test, build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run frontend tests (gate the release)
        run: node --test

      - name: Build the single-file site
        run: bash build.sh

      - name: Verify the committed bundle matches the tagged source
        run: |
          if ! git diff --quiet -- longwave-dev.html; then
            echo "::error::longwave-dev.html is stale at this tag — the release would ship a bundle that disagrees with its own source. Rebuild and commit before tagging."
            git --no-pager diff --stat -- longwave-dev.html
            exit 1
          fi
          echo "✓ tagged bundle matches source"

      - name: Resolve the release tag
        id: ver
        # Pass the user-supplied input through an env var (never interpolate ${{ }} straight
        # into a run: script — that's a shell-injection sink) and validate its shape so a
        # crafted tag can't inject commands downstream.
        env:
          TAG_INPUT: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$REF_TYPE" = "tag" ]; then TAG="$REF_NAME"; else TAG="$TAG_INPUT"; fi
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+(\.[0-9]+)*([.-][A-Za-z0-9]+)*$'; then
            echo "::error::Invalid release tag '$TAG' (expected e.g. v1.2.0)"; exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Package source + site bundle
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          zip -q -r "longwave-jobs-poc-${TAG}.zip" \
            longwave-dev.html src build.sh README.md package.json

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          gh release create "$TAG" \
            longwave-dev.html \
            "longwave-jobs-poc-${TAG}.zip" \
            --title "LongWave Dev ${TAG}" \
            --generate-notes
